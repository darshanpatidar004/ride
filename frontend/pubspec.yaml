name: ride_app
description: "A complete production-grade Driver Booking Platform."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management & Routing
  flutter_riverpod: ^2.4.9
  go_router: ^13.1.0
  
  # Networking
  dio: ^5.4.0
  
  # Local Storage & Security
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Realtime
  web_socket_channel: ^2.4.1
  
  # Maps & Location
  google_maps_flutter: ^2.5.3
  geolocator: ^12.0.0
  
  # UI & Utility
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^3.1.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
